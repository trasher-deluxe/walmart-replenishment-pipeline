name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Run ML pipeline (trains, tracks with MLflow, registers model)
        run: uv run python src/pipeline.py

      # Champion/challenger gate: the production forecaster (AutoETS) must beat the
      # seasonal-naive baseline. It does (~7 WAPE pts, see PROCESS.md §4), so this is a hard
      # assert and CI is green. If a future run promoted a worse-than-baseline model, the gate
      # goes red and blocks the merge — the same criterion that controls the @production alias.
      - name: Run tests (incl. champion/challenger gate)
        run: uv run pytest tests/ -v

      - name: Upload ml_results.json
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ml-results
          path: outputs/ml_results.json
